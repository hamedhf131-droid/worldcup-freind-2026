<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>بازی‌های جام جهانی</title>
</head>
<body style="font-family:tahoma; text-align:center; direction:rtl;">

<h1>📅 لیست بازی‌های جام جهانی</h1>

<div id="matches"></div>

<script>
// لیست نمونه بازی‌ها (بعداً از دیتابیس واقعی می‌کنیم)
const matches = [
  { team1: "ایران", team2: "انگلیس" },
  { team1: "فرانسه", team2: "آلمان" },
  { team1: "برزیل", team2: "آرژانتین" }
];

let html = "";

matches.forEach((m, index) => {
  html += 
    <div style="margin:20px; padding:15px; border:1px solid #ccc; border-radius:10px;">
      <h3>${m.team1} 🆚 ${m.team2}</h3>

      <input type="number" id="a${index}" placeholder="گل ${m.team1}">
      <input type="number" id="b${index}" placeholder="گل ${m.team2}">

      <br><br>

      <button onclick="predict(${index})">
        ثبت پیش‌بینی
      </button>

      <p id="r${index}"></p>
    </div>
  ;
});

document.getElementById("matches").innerHTML = html;

// ثبت پیش‌بینی (فعلاً فقط نمایش پیام)
function predict(i){
  let a = document.getElementById("a"+i).value;
  let b = document.getElementById("b"+i).value;

  document.getElementById("r"+i).innerText =
    "✅ پیش‌بینی ثبت شد: " + a + " - " + b;
}
</script>

</body>
</html>
